<div class="widget">
    <h4 class="widget__title">🎙️ Ouça ao Vivo ou a última gravação</h4>
    <div class="widget__content" style="text-align: center; background: #fdfdfd; padding: 20px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        
        <div id="audio-container">
            <button id="play-btn" onclick="toggleAudio()" style="background: #28a745; color: white; border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;">
                <span id="play-icon">▶️</span>
            </button>
            <strong id="status-text" style="display: block; font-size: 0.9rem; color: #333;">Ouvir Transmissão</strong>
        </div>

        <div id="youtube-audio-player" style="position: absolute; top: -9999px;"></div>

        <p style="font-size: 0.75rem; color: #888; margin-top: 12px; line-height: 1.2;">
            <span style="color: #28a745;">●</span> Transmissão otimizada (144p)<br>
            Economia de dados ativada.
        </p>
    </div>
</div>

<script>
    var player;
    var isPlaying = false;

    // Carrega a API do YouTube de forma assíncrona
    if (!window.YT) {
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-audio-player', {
            height: '1',
            width: '1',
            videoId: '', // Vazio para usar a live do canal
            playerVars: {
                'listType': 'live',
                'list': '{{ .Site.Params.youtubeChannelID }}'.replace(/^UC/, 'UU'),
                'autoplay': 0,
                'controls': 0,
                'disablekb': 1,
                'rel': 0,
                'modestbranding': 1
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerReady(event) {
        // Força a qualidade mínima assim que o player estiver pronto
        event.target.setPlaybackQuality('small'); 
    }

    function toggleAudio() {
        if (!player) return;
        
        if (!isPlaying) {
            player.playVideo();
            // Reforça a qualidade ao dar play
            player.setPlaybackQuality('small');
        } else {
            player.pauseVideo();
        }
    }

    function onPlayerStateChange(event) {
        var playIcon = document.getElementById('play-icon');
        var btn = document.getElementById('play-btn');
        var statusText = document.getElementById('status-text');

        if (event.data == YT.PlayerState.PLAYING) {
            isPlaying = true;
            playIcon.innerText = "⏸️";
            statusText.innerText = "Tocando...";
            btn.style.background = "#dc3545"; // Cor de "Parar"
            
            // O YouTube às vezes reseta a qualidade no início, forçamos novamente
            player.setPlaybackQuality('small');
        } else {
            isPlaying = false;
            playIcon.innerText = "▶️";
            statusText.innerText = "Ouvir Transmissão";
            btn.style.background = "#28a745"; // Cor de "Play"
        }
    }
</script>
